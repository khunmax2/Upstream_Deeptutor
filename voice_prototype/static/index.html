<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DeepTutor Voice Prototype</title>
<style>
  :root { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  body { margin: 0; background: #0f1115; color: #e7e9ee; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 1.2rem; font-weight: 600; }
  button { font-size: 1rem; padding: 10px 18px; border-radius: 10px; border: 0;
           cursor: pointer; background: #3b82f6; color: #fff; }
  button.stop { background: #ef4444; }
  button:disabled { opacity: .5; cursor: default; }
  .pill { display:inline-block; padding:2px 10px; border-radius:999px; font-size:.8rem;
          background:#1f2630; margin-right:6px; }
  .pill b { color:#7dd3fc; }
  #log { margin-top: 18px; }
  .msg { padding: 10px 14px; border-radius: 12px; margin: 8px 0; max-width: 80%;
         white-space: pre-wrap; line-height: 1.5; }
  .user { background: #1d4ed8; margin-left: auto; }
  .bot  { background: #1f2937; }
  .meta { font-size: .75rem; color: #94a3b8; margin-top: 4px; }
  #status { font-size:.85rem; color:#94a3b8; margin-left:10px; }
  .vu { display:inline-block; width:120px; height:8px; background:#1f2630;
        border-radius:6px; overflow:hidden; vertical-align:middle; }
  .vu > i { display:block; height:100%; width:0; background:#22c55e; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎙️ DeepTutor Voice Prototype <span id="status">ยังไม่เชื่อมต่อ</span></h1>
  <p>
    <button id="start">เริ่มสนทนา</button>
    <button id="stop" class="stop" disabled>หยุด</button>
    <span class="vu"><i id="vu"></i></span>
  </p>
  <div>
    <span class="pill">STT <b id="m-stt">–</b></span>
    <span class="pill">LLM TTFT <b id="m-llm">–</b></span>
    <span class="pill">TTS แรก <b id="m-tts">–</b></span>
    <span class="pill">เสียงแรก <b id="m-first">–</b></span>
    <span class="pill">รวม <b id="m-total">–</b></span>
  </div>
  <div id="log"></div>
</div>

<script>
// ── tuning ──
const ON = 0.020, OFF = 0.012, HANG_MS = 700, MIN_MS = 350;

let ws, audioCtx, analyser, stream, recorder, chunks = [];
let speaking = false, silenceStart = 0, speechStart = 0, running = false;
const playQueue = []; let player = null, playing = false;

const $ = id => document.getElementById(id);
const setStatus = t => $("status").textContent = t;

function addMsg(text, who, meta) {
  const d = document.createElement("div");
  d.className = "msg " + who; d.textContent = text;
  if (meta) { const m = document.createElement("div"); m.className="meta"; m.textContent=meta; d.appendChild(m); }
  $("log").appendChild(d); window.scrollTo(0, document.body.scrollHeight);
  return d;
}

// ── playback queue (sequential) + barge-in ──
function enqueueAudio(blob) { playQueue.push(blob); if (!playing) playNext(); }
function playNext() {
  if (!playQueue.length) { playing = false; return; }
  playing = true;
  const blob = playQueue.shift();
  player = new Audio(URL.createObjectURL(blob));
  player.onended = playNext;
  player.onerror = playNext;
  player.play().catch(playNext);
}
function stopPlayback() {           // barge-in: user started talking
  playQueue.length = 0;
  if (player) { player.pause(); player = null; }
  playing = false;
}

// ── WebSocket ──
function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.binaryType = "arraybuffer";
  let pendingMeta = null;
  ws.onopen = () => setStatus("เชื่อมต่อแล้ว");
  ws.onclose = () => setStatus("ตัดการเชื่อมต่อ");
  ws.onmessage = ev => {
    if (typeof ev.data !== "string") {           // binary = mp3 for the last header
      enqueueAudio(new Blob([ev.data], { type: "audio/mpeg" }));
      pendingMeta = null;
      return;
    }
    const m = JSON.parse(ev.data);
    if (m.type === "transcript") addMsg(m.text, "user");
    else if (m.type === "assistant_text") {
      if (window._bot) window._bot.firstChild.nodeValue = m.text;
      else window._bot = addMsg(m.text, "bot");
    }
    else if (m.type === "audio") pendingMeta = m;
    else if (m.type === "stage") {
      if (m.stage === "stt") $("m-stt").textContent = m.ms + " ms";
      if (m.stage === "llm_ttft") $("m-llm").textContent = m.ms + " ms";
      if (m.stage === "tts_first") $("m-tts").textContent = m.ms + " ms";
    }
    else if (m.type === "done") {
      $("m-total").textContent = m.total_ms + " ms";
      $("m-first").textContent = (m.first_audio_ms ?? "–") + " ms";
      window._bot = null;
    }
    else if (m.type === "error") addMsg("⚠ " + m.message, "bot");
  };
}

// ── mic + energy VAD endpointing ──
async function start() {
  stream = await navigator.mediaDevices.getUserMedia({ audio: {
    echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
  audioCtx = new AudioContext();
  const src = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser(); analyser.fftSize = 512;
  src.connect(analyser);
  connect();
  running = true; $("start").disabled = true; $("stop").disabled = false;
  newRecorder();
  monitor();
}

function newRecorder() {
  chunks = [];
  recorder = new MediaRecorder(stream, { mimeType: "audio/webm" });
  recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
  recorder.onstop = () => {
    const dur = performance.now() - speechStart;
    const blob = new Blob(chunks, { type: "audio/webm" });
    if (running && dur >= MIN_MS && ws.readyState === 1) ws.send(blob);
    if (running) newRecorder();          // ready for the next utterance
  };
}

function rms() {
  const buf = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(buf);
  let s = 0; for (const v of buf) { const x = (v - 128) / 128; s += x * x; }
  return Math.sqrt(s / buf.length);
}

function monitor() {
  if (!running) return;
  const level = rms();
  $("vu").style.width = Math.min(100, level * 600) + "%";
  const now = performance.now();
  if (!speaking) {
    if (level > ON) {                    // speech onset
      speaking = true; speechStart = now; silenceStart = 0;
      stopPlayback();                    // barge-in
      if (recorder.state === "inactive") recorder.start();
    }
  } else {
    if (level < OFF) {
      if (!silenceStart) silenceStart = now;
      else if (now - silenceStart > HANG_MS) {   // endpoint
        speaking = false; silenceStart = 0;
        if (recorder.state === "recording") recorder.stop();
      }
    } else silenceStart = 0;
  }
  requestAnimationFrame(monitor);
}

function stop() {
  running = false; $("start").disabled = false; $("stop").disabled = true;
  if (recorder && recorder.state === "recording") recorder.stop();
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (ws) ws.close();
  setStatus("หยุดแล้ว");
}

$("start").onclick = () => start().catch(e => addMsg("⚠ " + e.message, "bot"));
$("stop").onclick = stop;
</script>
</body>
</html>
