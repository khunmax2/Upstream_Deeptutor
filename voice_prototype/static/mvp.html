<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DeepTutor Voice — MVP</title>
<style>
  :root { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  body { margin: 0; background: #0f1115; color: #e7e9ee; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 1.15rem; font-weight: 600; }
  button { font-size: 1rem; padding: 10px 18px; border-radius: 10px; border: 0;
           cursor: pointer; background: #3b82f6; color: #fff; }
  button.stop { background: #ef4444; }
  button:disabled { opacity: .5; cursor: default; }
  label.opt { font-size:.85rem; color:#cbd5e1; margin-left:12px; }
  #status { font-size:.85rem; color:#94a3b8; margin-left:10px; }
  .pill { display:inline-block; padding:2px 10px; border-radius:999px; font-size:.8rem;
          background:#1f2630; margin-right:6px; }
  .pill b { color:#7dd3fc; }
  #log { margin-top: 18px; }
  .msg { padding: 10px 14px; border-radius: 12px; margin: 8px 0; max-width: 82%;
         white-space: pre-wrap; line-height: 1.5; }
  .user { background: #1d4ed8; margin-left: auto; }
  .bot  { background: #1f2937; }
  .interim { opacity:.55; font-style:italic; }
  .hint { font-size:.8rem; color:#94a3b8; margin-top:14px; line-height:1.6; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎙️ DeepTutor Voice — MVP <span id="status">พร้อม</span></h1>
  <p>
    <button id="start">เริ่มสนทนา</button>
    <button id="stop" class="stop" disabled>หยุด</button>
    <label class="opt"><input type="checkbox" id="barge" /> โหมดหูฟัง (พูดแทรกได้)</label>
  </p>
  <div>
    <span class="pill">LLM TTFT <b id="m-llm">–</b></span>
    <span class="pill">พูดประโยคแรก <b id="m-first">–</b></span>
    <span class="pill">รวม <b id="m-total">–</b></span>
  </div>
  <div id="log"></div>
  <div class="hint">
    ต้องใช้ Chrome/Edge · STT/TTS ทำงานในเบราว์เซอร์ (ภาษาไทย) · สมองมาจาก DeepTutor endpoint<br>
    เสียงตอบจะออกลำโพง — ถ้าใช้ลำโพงตัวจับเสียงจะได้ยินเสียงตัวเอง แนะนำใส่หูฟังแล้วเปิด "โหมดหูฟัง" เพื่อพูดแทรก
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const setStatus = t => $("status").textContent = t;

let ws, rec, running = false, micPaused = false;
let speaking = false; const speakQueue = [];
let turnStart = 0, firstAudioLogged = false;
let interimEl = null;

// ── WebSocket to the LLM brain ──
function connect() {
  ws = new WebSocket(`ws://${location.host}/ws/chat`);
  ws.onopen = () => setStatus("เชื่อมต่อแล้ว — พูดได้เลย");
  ws.onclose = () => setStatus("ตัดการเชื่อมต่อ");
  ws.onmessage = ev => {
    const m = JSON.parse(ev.data);
    if (m.type === "assistant_sentence") { addBot(m.text); enqueueSpeak(m.text); }
    else if (m.type === "stage" && m.stage === "llm_ttft") $("m-llm").textContent = m.ms + " ms";
    else if (m.type === "assistant_done") $("m-total").textContent = m.total_ms + " ms";
    else if (m.type === "error") addBot("⚠ " + m.message);
  };
}

// ── message log ──
function addUser(text) {
  const d = document.createElement("div"); d.className = "msg user"; d.textContent = text;
  $("log").appendChild(d); scroll();
}
let curBot = null;
function addBot(text) {
  // append sentences into one growing bubble per turn
  if (!curBot) { curBot = document.createElement("div"); curBot.className = "msg bot"; $("log").appendChild(curBot); }
  curBot.textContent += (curBot.textContent ? " " : "") + text; scroll();
}
function scroll() { window.scrollTo(0, document.body.scrollHeight); }

// ── speech synthesis (TTS) ──
function thaiVoice() {
  const vs = speechSynthesis.getVoices();
  return vs.find(v => (v.lang || "").toLowerCase().startsWith("th")) || null;
}
function enqueueSpeak(text) { speakQueue.push(text); if (!speaking) startSpeaking(); }
function startSpeaking() {
  speaking = true;
  if (!bargeMode()) pauseMic();       // avoid echo on speakers
  speakNext();
}
function speakNext() {
  if (!speakQueue.length) { speaking = false; if (!bargeMode()) resumeMic(); return; }
  const text = speakQueue.shift();
  const u = new SpeechSynthesisUtterance(text);
  const v = thaiVoice(); if (v) u.voice = v;
  u.lang = "th-TH"; u.rate = 1.0;
  if (!firstAudioLogged) { firstAudioLogged = true;
    $("m-first").textContent = Math.round(performance.now() - turnStart) + " ms"; }
  u.onend = speakNext; u.onerror = speakNext;
  speechSynthesis.speak(u);
}
function cancelSpeech() {           // barge-in
  speakQueue.length = 0; speaking = false;
  speechSynthesis.cancel();
}
const bargeMode = () => $("barge").checked;

// ── speech recognition (STT) ──
function startRec() {
  const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!Rec) { addBot("⚠ เบราว์เซอร์นี้ไม่รองรับ Web Speech API — ใช้ Chrome/Edge"); return; }
  rec = new Rec();
  rec.lang = "th-TH"; rec.continuous = true; rec.interimResults = true;
  rec.onresult = e => {
    let interim = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const r = e.results[i];
      if (r.isFinal) sendText(r[0].transcript.trim());
      else interim += r[0].transcript;
    }
    // barge-in: user talks while assistant is speaking (headphone mode)
    if (bargeMode() && speaking && interim.trim().length > 1) cancelSpeech();
    showInterim(interim);
  };
  rec.onend = () => { if (running && !micPaused) { try { rec.start(); } catch (_) {} } };
  rec.onerror = ev => { if (ev.error === "not-allowed") addBot("⚠ ไม่ได้รับสิทธิ์ไมโครโฟน"); };
  try { rec.start(); } catch (_) {}
}
function showInterim(text) {
  if (!text) { if (interimEl) { interimEl.remove(); interimEl = null; } return; }
  if (!interimEl) { interimEl = document.createElement("div"); interimEl.className = "msg user interim"; $("log").appendChild(interimEl); }
  interimEl.textContent = text; scroll();
}
function sendText(text) {
  if (!text) return;
  if (interimEl) { interimEl.remove(); interimEl = null; }
  addUser(text);
  curBot = null;                    // start a fresh assistant bubble
  turnStart = performance.now(); firstAudioLogged = false;
  $("m-llm").textContent = $("m-first").textContent = $("m-total").textContent = "–";
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: "user_text", text }));
}
function pauseMic() { micPaused = true; if (rec) try { rec.stop(); } catch (_) {} }
function resumeMic() { micPaused = false; if (rec && running) try { rec.start(); } catch (_) {} }

// ── controls ──
function start() {
  running = true; $("start").disabled = true; $("stop").disabled = false;
  speechSynthesis.getVoices();      // warm up voice list
  connect(); startRec();
}
function stop() {
  running = false; $("start").disabled = false; $("stop").disabled = true;
  cancelSpeech(); if (rec) try { rec.stop(); } catch (_) {}
  if (ws) ws.close(); setStatus("หยุดแล้ว");
}
$("start").onclick = start;
$("stop").onclick = stop;
if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = () => {};
</script>
</body>
</html>
